name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks scan for secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Install dependencies
        run: npm install
      - name: Install jsdom test environment for Jest
        run: npm install --save-dev jest-environment-jsdom
      - name: Lint extension with web-ext
        run: npm run lint
      - name: Run unit tests
        run: npm test

  build-and-upload:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Install dependencies
        run: npm install
      - name: Build extension (web-ext)
        run: npx web-ext build --overwrite-dest
      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: tabtogether-extension
          path: web-ext-artifacts/*.zip

